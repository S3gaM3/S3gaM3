<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f14"/>
      <stop offset="100%" stop-color="#1a2a33"/>
    </linearGradient>

    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00F5D4"/>
      <stop offset="100%" stop-color="#00BBF9"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="320" fill="url(#bg)"/>

  <!-- grid animation -->
  <g stroke="#12303d" stroke-width="1" opacity="0.2">
    <path d="M0 60 H1200">
      <animate attributeName="opacity" values="0.1;0.3;0.1" dur="6s" repeatCount="indefinite" />
    </path>
    <path d="M0 160 H1200">
      <animate attributeName="opacity" values="0.3;0.1;0.3" dur="5s" repeatCount="indefinite" />
    </path>
    <path d="M0 260 H1200">
      <animate attributeName="opacity" values="0.1;0.25;0.1" dur="7s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- boot log -->
  <g font-family="monospace" font-size="16" fill="#7aa6b2">
    <text x="60" y="80">[ OK ] Initializing system...</text>
    <text x="60" y="105">[ OK ] Loading modules: React, TypeScript</text>
    <text x="60" y="130">[ OK ] Starting Node environment</text>
    <text x="60" y="155">[ OK ] Optimizing performance</text>
  </g>

  <!-- main title -->
  <text x="60" y="220" fill="#00F5D4" font-family="monospace" font-size="44">
    &gt; Segak
    <animate attributeName="opacity" values="0;1" dur="1.2s" fill="freeze" />
  </text>

  <!-- cursor -->
  <rect x="260" y="190" width="10" height="40" fill="#00F5D4">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" />
  </rect>

  <!-- neon progress line -->
  <rect x="60" y="250" width="0" height="3" fill="url(#neon)">
    <animate attributeName="width" values="0;700" dur="2.5s" fill="freeze" />
  </rect>

  <!-- right side system blocks -->
  <g font-family="monospace" font-size="14" fill="#5f8b99">
    <text x="850" y="90">code()</text>
    <text x="850" y="110">structure()</text>
    <text x="850" y="130">scale()</text>
    <text x="850" y="150">optimize()</text>
  </g>

  <!-- subtle glow overlay -->
  <rect width="1200" height="320" fill="url(#neon)" opacity="0.03" />

</svg>

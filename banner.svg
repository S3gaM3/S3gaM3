<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f2027"/>
      <stop offset="100%" stop-color="#2c5364"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00F5D4"/>
      <stop offset="100%" stop-color="#00BBF9"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- grid lines -->
  <g stroke="#1f3b4d" stroke-width="1" opacity="0.3">
    <path d="M0 50 H1200"/>
    <path d="M0 100 H1200"/>
    <path d="M0 150 H1200"/>
    <path d="M0 200 H1200"/>
    <path d="M0 250 H1200"/>
  </g>

  <!-- terminal style text -->
  <text x="60" y="120" fill="#00F5D4" font-family="monospace" font-size="42">&gt; Segak</text>

  <text x="60" y="170" fill="#ffffff" font-family="monospace" font-size="20" opacity="0.8">
    init developer --stack=react,ts,node --mode=system
  </text>

  <!-- neon line -->
  <rect x="60" y="200" width="500" height="3" fill="url(#neon)" />

  <!-- subtle code block -->
  <text x="800" y="120" fill="#7aa6b2" font-family="monospace" font-size="14">
    code()
  </text>
  <text x="800" y="140" fill="#7aa6b2" font-family="monospace" font-size="14">
    structure()
  </text>
  <text x="800" y="160" fill="#7aa6b2" font-family="monospace" font-size="14">
    optimize()
  </text>

</svg>
